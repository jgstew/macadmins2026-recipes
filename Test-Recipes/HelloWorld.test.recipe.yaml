---
# Lesson 1 test. Run with:
#   autopkg run -vv Test-Recipes/HelloWorld.test.recipe.yaml --search-dir SharedProcessors
# It fails until you complete SharedProcessors/HelloWorld.py.
Description: Test the HelloWorld processor (Lesson 1).
Identifier: com.github.jgstew.macadmins2026.test.HelloWorld
Input:
  NAME: HelloWorldTest
MinimumVersion: "2.3"
Process:
  - Processor: com.github.jgstew.macadmins2026.SharedProcessors/HelloWorld
    Arguments:
      greeting_name: "MacAdmins"

  # Verify the processor produced the greeting we expect.
  - Processor: com.github.jgstew.macadmins2026.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%greeting_result%"
      assert_string: "Hello, MacAdmins!"
