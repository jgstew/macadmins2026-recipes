---
# Lesson 4 test. Run with:
#   autopkg run -vv Test-Recipes/FileHasher.test.recipe.yaml --search-dir SharedProcessors
# It fails until you complete SharedProcessors/FileHasher.py.
#
# The expected hashes below are for Test-Recipes/sample.txt exactly as shipped.
# If you edit sample.txt, these asserts will (correctly) fail.
Description: Test the FileHasher processor (Lesson 4).
Identifier: com.github.jgstew.macadmins2026.test.FileHasher
Input:
  NAME: FileHasherTest
MinimumVersion: "2.3"
Process:
  - Processor: com.github.jgstew.macadmins2026.SharedProcessors/FileHasher
    Arguments:
      file_path: "%RECIPE_DIR%/sample.txt"

  - Processor: com.github.jgstew.macadmins2026.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%filehasher_size%"
      assert_string: "58"

  - Processor: com.github.jgstew.macadmins2026.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%filehasher_md5%"
      assert_string: "1f14bb1c464b3d18b58b0e116c542570"

  - Processor: com.github.jgstew.macadmins2026.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%filehasher_sha1%"
      assert_string: "8206161b21351735d69481e11268f978cca5c576"

  - Processor: com.github.jgstew.macadmins2026.SharedProcessors/AssertInputContainsString
    Arguments:
      input_string: "%filehasher_sha256%"
      assert_string: "b1b05c59a3500b9dbb3a24c9a3c049f0b31338a2aaee642a22f8fae8edf4d5b1"
